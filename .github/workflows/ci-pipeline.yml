name: Stinger Core CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  go:
    name: Go tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Fetch Modules
        run: |
          if [ ! -f go.mod ]; then
            go mod init stinger
          fi
          go mod download

      - name: Run Low-Level Network Tests
        run: go test -race -v -covermode=atomic -coverprofile=coverage.txt ./...

  python:
    name: Python Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.14']

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run unit tests
        run: |
          pytest tests/python/ -v \
            --cov=smtp_stinger \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.12'
        with:
          name: python-coverage
          path: coverage.xml

  lint:
    name: Lint Python
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install lint tools
        run: pip install ruff

      - name: Run ruff
        run: ruff check smtp_stinger/ --output-format=github
        continue-on-error: true

  build-check:
    name: Verify Go Binaries Compile
    runs-on: ubuntu-latest
    needs: [go]

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Build smtp_worker
        run: go build -o /tmp/smtp_worker ./smtp_worker.go

      - name: Build parse_worker
        run: go build -o /tmp/parse_worker ./smtp_stinger

      - name: Confirm binaries exist
        run: |
          test -f /tmp/smtp_worker
          test -f /tmp/parse_worker
          echo "Both binaries compiled successfully"
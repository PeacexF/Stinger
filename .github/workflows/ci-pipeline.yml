name: Stinger Core Quality Gate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  go:
    name: Execute Go Verification Matrix
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Fetch Modules
        run: |
          if [ ! -f go.mod ]; then
            go mod init stinger
          fi
          go mod download

      - name: Run Low-Level Network Tests
        run: go test -race -v -covermode=atomic -coverprofile=coverage.txt ./...